services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketd
      POSTGRES_PASSWORD: marketd
      POSTGRES_DB: marketd
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketd -d marketd"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      HTTP_PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: marketd
      DB_PASSWORD: marketd
      DB_NAME: marketd
      DB_SSLMODE: disable
      LOG_LEVEL: info
    ports:
      - "8080:8080"

volumes:
  dbdata:
