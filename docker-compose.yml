services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketd
      POSTGRES_PASSWORD: marketd
      POSTGRES_DB: marketd
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketd -d marketd"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Inside the compose network the app reaches Postgres via the service
      # name and its internal port, overriding the localhost values in .env
      # (which are meant for running the app directly on the host).
      DB_HOST: db
      DB_PORT: "5432"
    ports:
      - "${DOCKER_PORT:-8080}:${HTTP_PORT:-8080}"

volumes:
  dbdata:
