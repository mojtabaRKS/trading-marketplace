basePath: /
definitions:
  dto.AuctionDetailResponse:
    properties:
      auction:
        $ref: '#/definitions/dto.AuctionResponse'
      highest_bid:
        $ref: '#/definitions/dto.BidResponse'
    type: object
  dto.AuctionListResponse:
    properties:
      auctions:
        items:
          $ref: '#/definitions/dto.AuctionResponse'
        type: array
    type: object
  dto.AuctionResponse:
    properties:
      ends_at:
        example: "2026-01-02T00:00:00Z"
        type: string
      highest_bid_id:
        type: integer
      id:
        example: 1
        type: integer
      item_id:
        example: 3
        type: integer
      seller_guild_id:
        example: 3
        type: integer
      starts_at:
        example: "2026-01-01T00:00:00Z"
        type: string
      status:
        example: active
        type: string
      winner_guild_id:
        type: integer
    type: object
  dto.BidResponse:
    properties:
      amount:
        example: 1200
        type: integer
      auction_id:
        example: 1
        type: integer
      bidder_guild_id:
        example: 1
        type: integer
      id:
        example: 1
        type: integer
      status:
        example: active
        type: string
    type: object
  dto.BuyRequest:
    properties:
      buyer_guild_id:
        example: 1
        type: integer
    required:
    - buyer_guild_id
    type: object
  dto.CancelBidRequest:
    properties:
      bidder_guild_id:
        example: 1
        type: integer
    required:
    - bidder_guild_id
    type: object
  dto.CreateItemRequest:
    properties:
      name:
        example: Elven Bow
        type: string
      owner_guild_id:
        example: 2
        type: integer
      stock:
        example: 5
        type: integer
      tier:
        example: rare
        type: string
    required:
    - name
    - owner_guild_id
    - tier
    type: object
  dto.ErrorResponse:
    properties:
      error:
        example: item not found
        type: string
    type: object
  dto.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  dto.ItemDetailResponse:
    properties:
      auction:
        $ref: '#/definitions/dto.AuctionResponse'
      item:
        $ref: '#/definitions/dto.ItemResponse'
      listing:
        $ref: '#/definitions/dto.ListingResponse'
    type: object
  dto.ItemListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.ItemResponse'
        type: array
    type: object
  dto.ItemResponse:
    properties:
      id:
        example: 3
        type: integer
      name:
        example: Soul Reaver
        type: string
      owner_guild_id:
        example: 3
        type: integer
      price:
        example: 250000
        type: integer
      status:
        example: available
        type: string
      stock:
        example: 1
        type: integer
      tier:
        example: legendary
        type: string
    type: object
  dto.ListForSaleRequest:
    properties:
      price:
        example: 500
        type: integer
      seller_guild_id:
        example: 2
        type: integer
    required:
    - price
    - seller_guild_id
    type: object
  dto.ListingResponse:
    properties:
      buyer_guild_id:
        type: integer
      id:
        example: 1
        type: integer
      item_id:
        example: 2
        type: integer
      price:
        example: 500
        type: integer
      seller_guild_id:
        example: 2
        type: integer
      status:
        example: open
        type: string
    type: object
  dto.OpenAuctionRequest:
    properties:
      seller_guild_id:
        example: 3
        type: integer
    required:
    - seller_guild_id
    type: object
  dto.PlaceBidRequest:
    properties:
      amount:
        example: 1200
        type: integer
      bidder_guild_id:
        example: 1
        type: integer
    required:
    - amount
    - bidder_guild_id
    type: object
  dto.StatusResponse:
    properties:
      status:
        example: cancelled
        type: string
    type: object
  dto.WalletResponse:
    properties:
      available:
        example: 98800
        type: integer
      guild_id:
        example: 1
        type: integer
      reserved:
        example: 1200
        type: integer
      total:
        example: 100000
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    name: Market Dragon Team
  description: |-
    Secure marketplace for trading and auctioning items in Aethoria.
    Common and Rare items trade via fixed-price listings. Legendary items trade via auctions.
  license:
    name: MIT
  title: Market Dragon API
  version: "1.0"
paths:
  /auctions:
    get:
      description: List every auction that is currently open for bids.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuctionListResponse'
      summary: List active auctions
      tags:
      - auctions
  /auctions/{id}:
    get:
      description: Get one auction and its current highest bid (if any).
      parameters:
      - description: Auction ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuctionDetailResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get an auction
      tags:
      - auctions
  /guilds/{id}/wallet:
    get:
      description: Return a guild's wallet balance. Available balance is Total minus
        Reserved.
      parameters:
      - description: Guild ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WalletResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get a guild wallet
      tags:
      - guilds
  /health:
    get:
      description: Return 200 while the service is up.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.HealthResponse'
      summary: Liveness probe
      tags:
      - system
  /items:
    get:
      description: List every item with its current validated Oracle price (when available).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ItemListResponse'
      summary: List items
      tags:
      - items
    post:
      consumes:
      - application/json
      description: Register a new item owned by a guild. The item is not for sale
        yet. Legendary items are unique (stock is forced to 1).
      parameters:
      - description: Idempotency key to make retries safe
        in: header
        name: Idempotency-Key
        type: string
      - description: Item to register
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateItemRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ItemResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register an item
      tags:
      - items
  /items/{id}:
    get:
      description: Get one item, its live price, and its active offer (fixed-price
        listing or auction) if any.
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ItemDetailResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get an item
      tags:
      - items
  /items/{id}/auction:
    post:
      consumes:
      - application/json
      description: Open an auction for a Legendary item. Only one active auction per
        item is allowed.
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
      - description: Idempotency key to make retries safe
        in: header
        name: Idempotency-Key
        type: string
      - description: Seller
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.OpenAuctionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AuctionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Open an auction
      tags:
      - items
  /items/{id}/bid:
    post:
      consumes:
      - application/json
      description: Place a bid on an item's active auction. A new bid must be at least
        5% above the current highest bid. Funds are reserved, not debited.
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
      - description: Idempotency key to make retries safe
        in: header
        name: Idempotency-Key
        type: string
      - description: Bid to place
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.PlaceBidRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.BidResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "402":
          description: Payment Required
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Place a bid
      tags:
      - items
  /items/{id}/bid/{bid_id}:
    delete:
      consumes:
      - application/json
      description: Cancel a bid on an item's active auction. You cannot cancel a bid
        while you are the highest bidder.
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
      - description: Bid ID
        in: path
        name: bid_id
        required: true
        type: integer
      - description: Idempotency key to make retries safe
        in: header
        name: Idempotency-Key
        type: string
      - description: Bidder
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CancelBidRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Cancel a bid
      tags:
      - items
  /items/{id}/buy:
    post:
      consumes:
      - application/json
      description: Buy a fixed-price item. Checks the balance and daily cap, moves
        money, and transfers the item in one transaction.
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
      - description: Idempotency key to make retries safe
        in: header
        name: Idempotency-Key
        type: string
      - description: Buyer
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BuyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListingResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "402":
          description: Payment Required
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Buy an item
      tags:
      - items
  /items/{id}/list:
    post:
      consumes:
      - application/json
      description: Offer a Common/Rare item at a fixed price (a limit order). Legendary
        items must use an auction instead.
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
      - description: Idempotency key to make retries safe
        in: header
        name: Idempotency-Key
        type: string
      - description: Price and seller
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ListForSaleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ListingResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List an item for sale
      tags:
      - items
schemes:
- http
swagger: "2.0"
tags:
- description: Register, list, sell, buy, and bid on items
  name: items
- description: Active auctions for Legendary items
  name: auctions
- description: Guild wallets
  name: guilds
- description: Health and diagnostics
  name: system
